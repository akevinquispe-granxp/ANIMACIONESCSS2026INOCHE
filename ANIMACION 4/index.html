<html>
    <head>
        <title></title>
        <style>
            *{
                margin:0;
                padding:0;   
            }
            #contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position: relative;
                margin: 0 auto; /* centrar el contenedor*/
                overflow: hidden; /* oculta todo lo que contiene */
            }
            #cuadrito{
                width: 100px;
                height: 100px;
                position: absolute; /* obligatorio para mover el div**/
                top: 50px;
                left:-100px;
                animation: cuadrito 3s infinite;
                animation-timing-function: linear; /* define la forma de moverse*/ 

            }
            @keyframes cuadrito{
                from{
                    left: -100px;

                }
                to{
                    left: 500px;

                }
            }
            #cuadrito img{
                width: 100px;
                height: 100px;
            }
        </style>
    </head>
    <body>
        <a href="../index.html"> VOLVER PAPU </a> 
        <div id="contenedor">
            <div id = "cuadrito">
                <img src="img/megaman.gif" alt="">
            </div>
        </div>

    </body>
</html>
