<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cohete Espacial</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* ESTRELLAS */
.estrella{
    position:absolute;
    background:white;
    border-radius:50%;
}

/* 7 ESTRELLAS DIFERENTES */
.e1{
    width:2px; height:2px;
    top:10%; left:100%;
    animation: mover1 4s linear infinite;
}

.e2{
    width:3px; height:3px;
    top:30%; left:100%;
    animation: mover2 6s linear infinite;
    animation-delay: 1s;
}

.e3{
    width:2px; height:2px;
    top:50%; left:100%;
    animation: mover3 5s linear infinite;
    animation-delay: 2s;
}

.e4{
    width:4px; height:4px;
    top:70%; left:100%;
    animation: mover4 7s linear infinite;
}

.e5{
    width:3px; height:3px;
    top:20%; left:100%;
    animation: mover5 3s linear infinite;
    animation-delay: 1.5s;
}

.e6{
    width:2px; height:2px;
    top:40%; left:100%;
    animation: mover6 4.5s linear infinite;
    animation-delay: 0.5s;
}

.e7{
    width:3px; height:3px;
    top:65%; left:100%;
    animation: mover7 5.5s linear infinite;
    animation-delay: 2.5s;
}

@keyframes mover1{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover2{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover3{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover4{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover5{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover6{ from{ left:100%; } to{ left:-10%; } }
@keyframes mover7{ from{ left:100%; } to{ left:-10%; } }

.cohete{
    position:absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    width:100px;
}

.cohete img{
    animation: flotar 3s ease-in-out infinite;
}

@keyframes flotar{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-8px); }
    100%{ transform: translateY(0px); }
}

</style>
</head>

<body>

<div class="estrella e1"></div>
<div class="estrella e2"></div>
<div class="estrella e3"></div>
<div class="estrella e4"></div>
<div class="estrella e5"></div>
<div class="estrella e6"></div>
<div class="estrella e7"></div>

<div class="cohete">
    <img src="img/cohete.gif">
</div>

</body>
</html>
