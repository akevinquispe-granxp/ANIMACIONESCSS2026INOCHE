<html>
<head>
<title>TECNOLOGIAS DE UNA PAGINA WEB</title>

<style>

*{
    padding: 0px;
    margin: 0px;
}

.contenedor{
    width: 600px;
    height: 300px;
    border: 1px solid black;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}

.tarjeta1, .tarjeta2, .tarjeta3{
    width: 200px;
    height: 300px;
    position: absolute;
    background-size: cover;
}

.tarjeta1{
    background-image: url(img/html.jpg);
    top: -300px;
    left: 0px;
    animation: tarjeta1 3s 1 forwards;
}

.tarjeta2{
    background-image: url(img/css.jpg);
    top: 300px;
    left: 200px;
    animation: tarjeta2 3s 1 forwards 3s;
}

.tarjeta3{
    background-image: url(img/js.jpg);
    top: 0px;
    left: 600px;
    animation: tarjeta3 3s 1 forwards 6s;
}

/*RICAS ANIMACIONES*/

@keyframes tarjeta1{

    0%{
        top: -300px;
        left: 0px;
        transform: rotateY(180deg);
    }
    50%{
        top: 150px;
        left: 50px;
    }
    100%{
        top: 0px;
        left: 0px;
    }
}
@keyframes tarjeta2{

    0%{
        top: 300px;
        left: 200px;
        transform: rotateY(180deg);
    }
    50%{
        top: -150px;
        left: 150px;
    }
    100%{
        top: 0px;
        left: 200px;
    }
}

@keyframes tarjeta3{

    0%{
        top: 0px;
        left: 600px;
        transform: rotateY(180deg);
    }
    50%{
        top: 100px;
        left: 250px;
    }
    100%{
        top: 0px;
        left: 400px;
    }
}

/*EVENTOS*/

.tarjeta1:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

.tarjeta2:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

.tarjeta3:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
}

</style>
</head>

<body>

<div class="contenedor">
    <div class="tarjeta1"></div>
    <div class="tarjeta2"></div>
    <div class="tarjeta3"></div>
</div>

</body>
</html>
